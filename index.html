<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Бильярд — Турнир</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <div class="header-content">
      <h1 id="title">Турнир</h1>
      <div id="tournamentInfo" class="tournament-info"></div>
    </div>
    <div class="header-status">
      <span id="liveIndicator" class="live-indicator">● LIVE</span>
      <div id="status">Подключение...</div>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab-btn active" data-tab="bracket">Сетка</button>
    <button class="tab-btn" data-tab="matches">Матчи</button>
    <button class="tab-btn" data-tab="players">Участники</button>
    <button class="tab-btn" data-tab="results">Результаты</button>
  </nav>

  <main>
    <section id="bracket" class="tab-content active">
      <h2>Турнирная сетка</h2>
      <div id="bracketType" class="bracket-type"></div>
      <div id="bracketContainer" class="bracket-container"></div>
    </section>

    <section id="matches" class="tab-content">
      <h2>Все матчи</h2>
      <div id="matchesContainer" class="matches-container"></div>
    </section>

    <section id="players" class="tab-content">
      <h2>Участники турнира</h2>
      <div id="playersContainer" class="players-container"></div>
    </section>

    <section id="results" class="tab-content">
      <h2>Результаты игр</h2>
      <div id="resultsContainer" class="results-container"></div>
    </section>
  </main>

  <footer>
    <div class="footer-content">
      <span id="lastUpdate">Обновлено: --:--:--</span>
      <span>Веб-интерфейс для турнира по бильярду</span>
    </div>
  </footer>

  <!-- Полноэкранный просмотр счёта -->
  <div id="scoreOverlay" class="score-overlay">
    <div class="score-overlay-header">
      <span id="scoreMatchTitle">Матч</span>
      <button class="score-close-btn" onclick="closeScoreOverlay()">✕ Закрыть</button>
    </div>
    <div class="score-overlay-body">
      <div class="score-side score-side-left">
        <div class="score-player-name" id="scorePlayer1Name">Игрок 1</div>
        <div class="score-big-number" id="scoreDisplay1">0</div>
      </div>
      <div class="score-center">
        <div class="score-vs">VS</div>
        <div class="score-target">До 8</div>
      </div>
      <div class="score-side score-side-right">
        <div class="score-player-name" id="scorePlayer2Name">Игрок 2</div>
        <div class="score-big-number" id="scoreDisplay2">0</div>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
